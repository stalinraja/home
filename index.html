<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI TND HOME</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --brand-orange: #FF8C00;
            --text-gray: #777;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Center Logo */
        .logo-container {
            width: 300px;
            max-width: 80%;
            margin-bottom: 40px;
        }
        .logo-container img { width: 100%; height: auto; }

        /* Action Button */
        .btn-launch {
            padding: 16px 40px;
            background: transparent;
            color: var(--brand-orange);
            border: 2px solid var(--brand-orange);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px; /* Minimalist square-ish look */
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-launch:hover {
            background: var(--brand-orange);
            color: white;
            box-shadow: 0 5px 15px rgba(255,140,0,0.2);
        }

        /* Bottom Right Credit Section */
        .credit-container {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-gray);
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .credit-container:hover {
            color: var(--brand-orange);
        }

        /* Simple Static Hexagon Shape */
        .simple-hex {
            width: 16px;
            height: 9.24px;
            background-color: transparent;
            border-left: 2px solid currentColor;
            border-right: 2px solid currentColor;
            position: relative;
        }

        .simple-hex:before,
        .simple-hex:after {
            content: "";
            position: absolute;
            width: 11.31px;
            height: 11.31px;
            border: 2px solid currentColor;
            left: 0.35px;
            transform: scaleY(0.5774) rotate(-45deg);
        }

        .simple-hex:before { top: -6.5px; border-bottom: 0; border-left: 0; }
        .simple-hex:after { bottom: -6.5px; border-top: 0; border-right: 0; }

    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <button class="btn-launch" id="launchBtn">Launch Priority List</button>

    <a href="https://metakey.solutions" class="credit-container">
        <span>crafted by</span>
        <div class="simple-hex"></div>
    </a>

    <script>
        const btn = document.getElementById('launchBtn');

        btn.addEventListener('click', () => {
            // 1. Visually deactivate button
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.innerText = 'Redirecting...';

            // 2. High-Quality Confetti Fireworks for 4 Seconds
            const end = Date.now() + 4000;
            const colors = ['#FF8C00', '#FFD700', '#ffffff'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 3. Final Redirect
            setTimeout(() => {
                window.location.href = "https://prioritylist.csitnd.org";
            }, 4000);
        });
    </script>
</body>
</html>
