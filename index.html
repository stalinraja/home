<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI TND HOME</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --brand-orange: #FF8C00;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Center Logo (Still) */
        .logo-container {
            width: 320px;
            max-width: 80%;
            margin-bottom: 30px;
            z-index: 10;
        }
        .logo-container img { width: 100%; height: auto; }

        /* Action Button */
        .btn-launch {
            padding: 18px 45px;
            background: transparent;
            color: var(--brand-orange);
            border: 3px solid var(--brand-orange);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            z-index: 10;
            text-transform: uppercase;
        }

        .btn-launch:hover {
            background: var(--brand-orange);
            color: white;
            box-shadow: 0 10px 20px rgba(255,140,0,0.3);
            transform: translateY(-2px);
        }

        /* Simple Loading Hexagon (Bottom Right) */
        .hex-loader {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 50px;
            height: 28.87px; /* Correct height ratio for a hexagon */
            background-color: transparent;
            border-left: 4px solid var(--brand-orange);
            border-right: 4px solid var(--brand-orange);
            position: relative;
            animation: hex-spin 2s linear infinite;
            cursor: pointer;
        }

        .hex-loader:before,
        .hex-loader:after {
            content: "";
            position: absolute;
            width: 35.36px; /* Correct size to complete the hexagon */
            height: 35.36px;
            border: 4px solid var(--brand-orange);
            left: 3.3px; /* Center adjustment */
            transform: scaleY(0.5774) rotate(-45deg);
        }

        .hex-loader:before {
            top: -21px; /* Correct placement */
            border-bottom: 0;
            border-left: 0;
        }

        .hex-loader:after {
            bottom: -21px;
            border-top: 0;
            border-right: 0;
        }

        @keyframes hex-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Prevent clicking the hexagon while redirecting from button */
        .no-click {
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <button class="btn-launch" id="launchBtn">Launch Priority List</button>

    <div class="hex-loader" id="metaLink" onclick="window.location.href='https://metakey.solutions'"></div>

    <script>
        const btn = document.getElementById('launchBtn');
        const hex = document.getElementById('metaLink');

        btn.addEventListener('click', () => {
            // 1. Visually deactivate interactions
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';
            hex.classList.add('no-click');

            // 2. Continuous Pro Fireworks for 4 Seconds
            const end = Date.now() + 4000;
            const colors = ['#FF8C00', '#FFD700', '#FFFFFF'];

            (function frame() {
                // Left side launch
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0, y: 0.7 },
                    colors: colors
                });
                // Right side launch
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1, y: 0.7 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 3. Final Redirect
            setTimeout(() => {
                window.location.href = "https://prioritylist.csitnd.org";
            }, 4000);
        });
    </script>
</body>
</html>
