<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI TND HOME</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --brand-orange: #FF8C00;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Center Logo */
        .logo-container {
            width: 280px;
            margin-bottom: 20px;
            z-index: 10;
        }
        .logo-container img { width: 100%; height: auto; }

        /* Rocket Styling (No Flame) */
        #rocket-stage {
            height: 180px;
            position: relative;
            transition: transform 4s cubic-bezier(.65,.05,.36,1);
            z-index: 5;
        }
        .rocket-img { height: 100%; width: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }

        .launching { transform: translateY(-120vh) scale(0.5); }

        /* Button Styling */
        .btn-launch {
            margin-top: 30px;
            padding: 16px 45px;
            background: transparent;
            color: var(--brand-orange);
            border: 3px solid var(--brand-orange);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            z-index: 10;
            text-transform: uppercase;
        }
        .btn-launch:hover {
            background: var(--brand-orange);
            color: white;
            box-shadow: 0 10px 25px rgba(255,140,0,0.4);
        }

        /* Hollow Rotating Loading Hexagon (Bottom Right) */
        .hex-loader-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hollow-hex {
            width: 44px;
            height: 25.4px;
            background-color: transparent;
            border-left: 3px solid var(--brand-orange);
            border-right: 3px solid var(--brand-orange);
            position: relative;
            animation: hex-spin 2s linear infinite;
        }

        .hollow-hex:before,
        .hollow-hex:after {
            content: "";
            position: absolute;
            width: 31.11px;
            height: 31.11px;
            border: 3px solid var(--brand-orange);
            left: 3.4px;
            transform: scaleY(0.5774) rotate(-45deg);
        }

        .hollow-hex:before { top: -18.5px; border-bottom: 0; border-left: 0; }
        .hollow-hex:after { bottom: -18.5px; border-top: 0; border-right: 0; }

        @keyframes hex-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <div id="rocket-stage">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/9088337273125345608_0" alt="Rocket" class="rocket-img">
    </div>

    <button class="btn-launch" id="launchBtn">Launch Priority List</button>

    <div class="hex-loader-container" onclick="window.location.href='https://metakey.solutions'">
        <div class="hollow-hex"></div>
    </div>

    <script>
        const btn = document.getElementById('launchBtn');
        const rocket = document.getElementById('rocket-stage');

        btn.addEventListener('click', () => {
            // 1. Launch Rocket
            rocket.classList.add('launching');
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';

            // 2. Firework Finale (Canvas Confetti)
            const end = Date.now() + 4000;
            const colors = ['#FF8C00', '#FFD700', '#FFFFFF', '#000000'];

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 70,
                    origin: { x: 0, y: 0.8 },
                    colors: colors
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 70,
                    origin: { x: 1, y: 0.8 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 3. Redirect to Priority List
            setTimeout(() => {
                window.location.href = "https://prioritylist.csitnd.org";
            }, 4000);
        });
    </script>
</body>
</html>
