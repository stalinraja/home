<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #3498db;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Center Logo Styling */
        .logo-container {
            width: 300px;
            max-width: 80%;
            animation: float 4s ease-in-out infinite;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* 3D Construction Animation (Bottom Right) */
        .construction-loader {
            position: absolute;
            bottom: 50px;
            right: 50px;
            perspective: 600px;
        }

        .cube {
            width: 40px;
            height: 40px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 3s infinite linear;
        }

        .cube div {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(52, 152, 219, 0.2);
            border: 2px solid var(--accent-color);
        }

        /* Positioning Cube Faces */
        .front  { transform: translateZ(20px); }
        .back   { transform: rotateY(180deg) translateZ(20px); }
        .right  { transform: rotateY(90deg) translateZ(20px); }
        .left   { transform: rotateY(-90deg) translateZ(20px); }
        .top    { transform: rotateX(90deg) translateZ(20px); }
        .bottom { transform: rotateX(-90deg) translateZ(20px); }

        /* Keyframes */
        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Simple Loading Ring under the cube */
        .ring {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%) rotateX(75deg);
            width: 60px;
            height: 60px;
            border: 4px solid rgba(52, 152, 219, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateX(-50%) rotateX(75deg) rotate(0deg); }
            100% { transform: translateX(-50%) rotateX(75deg) rotate(360deg); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .construction-loader {
                bottom: 30px;
                right: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <div class="construction-loader">
        <div class="cube">
            <div class="front"></div>
            <div class="back"></div>
            <div class="right"></div>
            <div class="left"></div>
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
        <div class="ring"></div>
    </div>

    <script>
        // Subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('.logo-container');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            logo.style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
    </script>
</body>
</html>
