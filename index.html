<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI TND HOME</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --brand-orange: #FF8C00;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Center Logo */
        .logo-container {
            width: 280px;
            margin-bottom: 20px;
            z-index: 10;
        }
        .logo-container img { width: 100%; height: auto; }

        /* Realistic Rocket Container */
        #rocket-stage {
            height: 150px;
            width: 150px;
            position: relative;
            transition: transform 4s cubic-bezier(.65,.05,.36,1);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .rocket-img {
            height: 100%;
            width: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        /* Launch Animation */
        .launching {
            transform: translateY(-120vh) scale(0.5);
        }

        /* Smoke/Fire Effect */
        .thruster-fire {
            position: absolute;
            bottom: -10px;
            width: 20px;
            height: 0;
            background: linear-gradient(to bottom, #ff8c00, #ff0000, transparent);
            border-radius: 50%;
            transition: height 0.2s;
            filter: blur(5px);
        }

        .launching .thruster-fire {
            height: 80px;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.8; width: 20px; }
            100% { opacity: 1; width: 25px; }
        }

        /* Action Button */
        .btn-launch {
            margin-top: 30px;
            padding: 16px 40px;
            background: transparent;
            color: var(--brand-orange);
            border: 2px solid var(--brand-orange);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            z-index: 10;
            text-transform: uppercase;
        }

        .btn-launch:hover {
            background: var(--brand-orange);
            color: white;
            box-shadow: 0 10px 20px rgba(255,140,0,0.3);
            transform: translateY(-2px);
        }

        /* Beautiful Rotating 3D Hexagon (Bottom Right) */
        .hex-footer {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            perspective: 1000px;
        }

        .hex-orbit {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate3d 8s linear infinite;
            cursor: pointer;
        }

        .hexagon-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--brand-orange);
            background: rgba(255, 140, 0, 0.05);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            box-shadow: 0 0 15px var(--brand-orange);
        }

        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(45deg); }
            100% { transform: rotateY(360deg) rotateX(45deg); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <div id="rocket-stage">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/9088337273125345608_0" alt="Rocket" class="rocket-img">
        <div class="thruster-fire"></div>
    </div>

    <button class="btn-launch" id="launchBtn">Launch Priority List</button>

    <div class="hex-footer" onclick="window.location.href='https://metakey.solutions'">
        <div class="hex-orbit">
            <div class="hexagon-shape"></div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('launchBtn');
        const rocket = document.getElementById('rocket-stage');

        btn.addEventListener('click', () => {
            // 1. Launch Sequence
            rocket.classList.add('launching');
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';

            // 2. Pro Fireworks (Canvas Confetti)
            const end = Date.now() + 4000;
            const colors = ['#ff8c00', '#ffffff', '#ffd700'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // 3. Final Redirect
            setTimeout(() => {
                window.location.href = "https://prioritylist.csitnd.org";
            }, 4000);
        });
    </script>
</body>
</html>
