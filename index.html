<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        :root {
            --alien-green: #39ff14;
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* White page as requested originally */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Center Logo */
        .logo-container {
            width: 280px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        /* Alien Green Text Styling */
        .status-text {
            color: var(--alien-green);
            background: #000;
            padding: 5px 15px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            border-radius: 4px;
            font-size: 0.9rem;
            animation: blink 1.5s infinite;
        }

        /* Hexagon Animation (Bottom Right) */
        .hexagon-wrapper {
            position: absolute;
            bottom: 50px;
            right: 50px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .hexagon-wrapper:hover {
            transform: scale(1.1);
        }

        .hexagon {
            position: relative;
            width: 60px; 
            height: 34.64px;
            background-color: var(--alien-green);
            margin: 17.32px 0;
            animation: rotateHex 4s infinite linear;
            box-shadow: 0 0 20px var(--alien-green);
        }

        .hexagon:before,
        .hexagon:after {
            content: "";
            position: absolute;
            width: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
        }

        .hexagon:before {
            bottom: 100%;
            border-bottom: 17.32px solid var(--alien-green);
        }

        .hexagon:after {
            top: 100%;
            width: 0;
            border-top: 17.32px solid var(--alien-green);
        }

        /* Animations */
        @keyframes rotateHex {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Redirect Interaction */
        .glitch-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--alien-green);
            display: none;
            z-index: 999;
            opacity: 0.3;
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <div class="status-text">
        > THIS PAGE IS UNDER CONSTRUCTION _
    </div>

    <div class="hexagon-wrapper" id="metaLink">
        <div class="hexagon"></div>
        <div class="glitch-overlay" id="overlay"></div>
    </div>

    <script>
        const hex = document.getElementById('metaLink');
        const overlay = document.getElementById('overlay');

        hex.addEventListener('click', () => {
            // Visual feedback
            overlay.style.display = 'block';
            
            // Short delay for the "effect" before redirecting
            setTimeout(() => {
                window.location.href = "https://metakey.solutions";
            }, 300);
        });

        // Mouse follow effect for the logo
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('.logo-container');
            const x = (window.innerWidth / 2 - e.pageX) / 60;
            const y = (window.innerHeight / 2 - e.pageY) / 60;
            logo.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
