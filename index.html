<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI TND HOME</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --brand-orange: #FF8C00;
            --rocket-color: #333;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #ffffff;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Center Logo */
        .logo-container {
            width: 280px;
            margin-bottom: 40px;
            z-index: 10;
        }
        .logo-container img { width: 100%; height: auto; }

        /* Rocket Launch Animation Container */
        #rocket-container {
            width: 60px;
            height: 100px;
            margin-bottom: 20px;
            transition: transform 4s cubic-bezier(.47,0,.74,.71);
            position: relative;
        }

        .rocket-svg { width: 100%; height: auto; }

        .launching {
            transform: translateY(-100vh);
        }

        /* Button Styling */
        .btn-launch {
            padding: 15px 35px;
            background: transparent;
            color: var(--brand-orange);
            border: 2px solid var(--brand-orange);
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            z-index: 10;
        }
        .btn-launch:hover {
            background: var(--brand-orange);
            color: white;
            box-shadow: 0 0 20px rgba(255,140,0,0.4);
        }

        /* Beautiful Rotating Hexagon (Bottom Right) */
        .hex-link {
            position: absolute;
            bottom: 40px;
            right: 40px;
            cursor: pointer;
            text-decoration: none;
        }

        .hex-box {
            width: 50px;
            height: 50px;
            position: relative;
            animation: rotate3D 6s linear infinite;
            transform-style: preserve-3d;
        }

        .hex-shape {
            position: absolute;
            width: 100%; height: 100%;
            border: 2px solid var(--brand-orange);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background: rgba(255, 140, 0, 0.05);
            box-shadow: inset 0 0 10px var(--brand-orange);
        }

        @keyframes rotate3D {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        /* Smoke particles */
        .smoke {
            position: absolute;
            bottom: -10px;
            left: 50%;
            width: 10px; height: 10px;
            background: #ddd;
            border-radius: 50%;
            opacity: 0;
        }
        .launching .smoke {
            animation: smokeTrail 1s infinite;
        }
        @keyframes smokeTrail {
            0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(4) translateY(20px); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <div id="rocket-container">
        <svg class="rocket-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="#FF8C00"/>
            <path d="M12 18V21" stroke="#FF8C00" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="smoke"></div>
    </div>

    <button class="btn-launch" id="launchBtn">LAUNCH PRIORITY LIST</button>

    <a href="https://metakey.solutions" class="hex-link">
        <div class="hex-box">
            <div class="hex-shape"></div>
        </div>
    </a>

    <script>
        const btn = document.getElementById('launchBtn');
        const rocket = document.getElementById('rocket-container');

        btn.addEventListener('click', () => {
            // 1. Start Rocket Launch
            rocket.classList.add('launching');
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';

            // 2. Trigger Smooth Fireworks (using Canvas-Confetti for that CodePen look)
            const duration = 4 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
              const timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              const particleCount = 50 * (timeLeft / duration);
              // since particles fall down, start a bit higher than random
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // 3. Redirect after 4 seconds
            setTimeout(() => {
                window.location.href = "https://prioritylist.csitnd.org";
            }, 4000);
        });
    </script>
</body>
</html>
