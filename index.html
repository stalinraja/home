<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        :root {
            --alien-green: #39ff14;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Center Logo with Breathing Animation */
        .logo-container {
            width: 320px;
            max-width: 80%;
            animation: breathe 5s ease-in-out infinite;
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        /* Bottom Right Container */
        .footer-status {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            cursor: pointer;
        }

        /* Alien Green Text - No Background */
        .status-text {
            color: var(--alien-green);
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            user-select: none;
        }

        /* Hollow Triple Hexagon Loader */
        .hex-loader {
            display: flex;
            gap: 8px;
        }

        .hexagon {
            width: 24px;
            height: 14px;
            background-color: transparent;
            border-left: 2px solid var(--alien-green);
            border-right: 2px solid var(--alien-green);
            position: relative;
            transition: all 0.3s ease;
        }

        .hexagon::before, .hexagon::after {
            content: "";
            position: absolute;
            width: 16.97px;
            height: 16.97px;
            border: 2px solid var(--alien-green);
            left: 1.5px;
            transform: scaleY(0.5774) rotate(-45deg);
        }

        .hexagon::before { top: -10px; border-bottom: 0; border-left: 0; }
        .hexagon::after { bottom: -10px; border-top: 0; border-right: 0; }

        /* Animation: Hexagons pulsing in sequence */
        .hexagon:nth-child(1) { animation: pulse 1.5s infinite 0s; }
        .hexagon:nth-child(2) { animation: pulse 1.5s infinite 0.2s; }
        .hexagon:nth-child(3) { animation: pulse 1.5s infinite 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.03); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <img src="diocese-logo.png" alt="Logo">
    </div>

    <div class="footer-status" onclick="window.location.href='https://metakey.solutions'">
        <div class="hex-loader">
            <div class="hexagon"></div>
            <div class="hexagon"></div>
            <div class="hexagon"></div>
        </div>
        <div class="status-text">THIS PAGE IS UNDER CONSTRUCTION</div>
    </div>

</body>
</html>
